{% extends "auth/base.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-center text-gray-800 mb-6">登录</h1>

{% if form.non_field_errors %}
<ul class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    {% for error in form.non_field_errors %}
    <li>{{ error }}</li>
    {% endfor %}
</ul>
{% endif %}

<form method="post">
    {% csrf_token %}
    <div class="mb-4">
        <label for="id_username" class="block text-gray-700 text-sm font-medium mb-2">用户名</label>
        <input type="text" name="username" id="id_username" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition">
    </div>
    <div class="mb-4">
        <label for="id_password" class="block text-gray-700 text-sm font-medium mb-2">密码</label>
        <input type="password" name="password" id="id_password" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition">
    </div>
    <div class="mb-6">
        <label class="flex items-center">
            <input type="checkbox" name="remember" id="id_remember"
                class="w-4 h-4 text-violet-600 border-gray-300 rounded focus:ring-violet-500">
            <span class="ml-2 text-sm text-gray-600">记住我</span>
        </label>
    </div>
    <button type="submit"
        class="w-full bg-gradient-to-r from-violet-500 to-purple-600 text-white font-semibold py-3 rounded-lg hover:from-violet-600 hover:to-purple-700 transform hover:-translate-y-0.5 transition-all duration-200 shadow-lg">
        登录
    </button>
</form>

<div class="text-center mt-6">
    <p class="text-gray-600 text-sm">
        还没有账号？<a href="{% url 'front:register' %}"
            class="text-violet-600 hover:text-violet-700 font-medium hover:underline">立即注册</a>
    </p>
</div>
{% endblock %}
